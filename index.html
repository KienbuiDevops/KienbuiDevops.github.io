<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============ THAY THÔNG TIN TẠI ĐÂY ============ -->
  <title>Astravell Studios — Music & AI Art</title>
  <meta name="description" content="Listen & follow — all my music in one place." />

  <!-- Open Graph (preview khi share Facebook/Zalo) -->
  <meta property="og:title" content="Astravell Studios — Music & AI Art" />
  <meta property="og:description" content="Listen & follow — all my music in one place." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="avatar.png" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />

  <style>
    :root {
      --bg-1: #0f0c29;
      --bg-2: #302b63;
      --bg-3: #24243e;
      --card: rgba(255, 255, 255, 0.08);
      --card-hover: rgba(255, 255, 255, 0.16);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.6);
      --ring: rgba(255, 255, 255, 0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      background-size: 200% 200%;
      animation: gradientShift 18s ease infinite;
      display: flex;
      justify-content: center;
      padding: 56px 20px 40px;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    /* ---------- Avatar ---------- */
    .avatar-wrap {
      width: 104px; height: 104px;
      margin: 0 auto 18px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #ff6ec4, #7873f5);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    .avatar {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      background: #24243e;
    }
    /* fallback initials (hiện khi chưa có avatar.jpg) */
    .avatar-fallback {
      width: 100%; height: 100%;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 38px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(135deg, #ff6ec4, #7873f5);
    }

    h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .bio { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.5; }

    /* ---------- Link buttons ---------- */
    .links { display: flex; flex-direction: column; gap: 14px; }

    .link {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 18px;
      background: var(--card);
      border: 1px solid var(--ring);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 15px; font-weight: 600;
      backdrop-filter: blur(6px);
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
    }
    .link:hover, .link:focus {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }
    .link svg { width: 24px; height: 24px; flex: 0 0 24px; }
    .link .label { flex: 1; text-align: center; }
    /* giữ icon cân giữa nút bằng 1 spacer */
    .link .spacer { width: 24px; flex: 0 0 24px; }

    footer { margin-top: 34px; color: var(--muted); font-size: 12px; }

    @media (max-width: 380px) {
      h1 { font-size: 20px; }
      .link { padding: 14px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="avatar-wrap">
      <!-- Thả ảnh tên 'avatar.jpg' vào cùng thư mục là tự hiện. Chưa có thì hiện chữ cái đầu. -->
      <img class="avatar" src="avatar.png" alt="Astravell Studios"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
      <div class="avatar-fallback" style="display:none">AS</div>
    </div>

    <h1>Astravell Studios</h1>
    <p class="bio">🎵 Original music &amp; AI art · Listen everywhere below</p>

    <nav class="links">
      <!-- ============ THAY LINK THẬT VÀO href ============ -->

      <!-- YouTube -->
      <a class="link" href="https://youtube.com/@CHANGE_ME" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#FF0000"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>

        <span class="spacer"></span>

      <!-- Spotify -->

        <svg viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm5.5 17.3a.75.75 0 0 1-1 .25c-2.8-1.7-6.3-2.1-10.4-1.1a.75.75 0 1 1-.34-1.46c4.5-1 8.4-.6 11.5 1.3.36.22.47.69.24 1.02zm1.47-3.27a.94.94 0 0 1-1.29.31c-3.2-2-8.1-2.55-11.9-1.4a.94.94 0 1 1-.54-1.8c4.3-1.3 9.7-.7 13.4 1.6.44.27.58.85.33 1.29zm.13-3.4C15.3 8.27 8.9 8.05 5.3 9.15a1.12 1.12 0 1 1-.65-2.15c4.1-1.25 11.2-1 15.5 1.55a1.12 1.12 0 1 1-1.15 1.92z"/></svg>
        <span class="label">Spotify</span>
        <span class="spacer"></span>
      </a>

      <!-- TikTok -->
      <a class="link" href="https://tiktok.com/@CHANGE_ME" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#ffffff"><path d="M16.6 5.8a4.8 4.8 0 0 1-1-.1 4.9 4.9 0 0 1-2.1-1.3 4.8 4.8 0 0 1-1.3-2.7V1.5h-3.2v13.1a2.7 2.7 0 0 1-2.7 2.6 2.7 2.7 0 1 1 .9-5.2V8.7a5.8 5.8 0 0 0-.9-.07 5.9 5.9 0 1 0 5.9 5.9V8.3a8 8 0 0 0 4.7 1.5V6.6a4.8 4.8 0 0 1-.1-.8z"/></svg>
        <span class="label">TikTok</span>
        <span class="spacer"></span>
      </a>

      <!-- SoundCloud -->
      <a class="link" href="https://soundcloud.com/CHANGE_ME" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#FF5500"><path d="M1 14.2c0-.2-.1-.3-.2-.3s-.2.1-.2.3l-.3 1.6.3 1.5c0 .2.1.3.2.3s.2-.1.2-.3l.3-1.5L1 14.2zm1.6-1.1c0-.2-.1-.3-.2-.3s-.2.1-.2.3l-.4 2.7.4 2.6c0 .2.1.3.2.3s.2-.1.2-.3l.5-2.6-.5-2.7zm9.9-3.6c-.4 0-.7.1-1 .2a6.5 6.5 0 0 0-6.4-5.6c-.8 0-1.5.2-2.2.5-.3.1-.3.2-.3.4v9.9c0 .2.1.3.3.3h9.6a2.8 2.8 0 0 0 0-5.7zM4 9.6c-.1 0-.2.1-.2.3l-.4 5.2.4 4.9c0 .2.1.3.2.3s.2-.1.2-.3l.4-4.9-.4-5.2c0-.2-.1-.3-.2-.3zm1.6-.7c-.1 0-.3.1-.3.3l-.3 5.9.3 4.7c0 .2.1.3.3.3.1 0 .2-.1.2-.3l.4-4.7-.4-5.9c0-.2-.1-.3-.2-.3z"/></svg>
        <span class="label">SoundCloud</span>
        <span class="spacer"></span>
      </a>

      <!-- Buy Music -->
      <a class="link" href="https://CHANGE_ME-bandcamp-or-gumroad.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="#fbbf24"><path d="M9 3v10.6A4 4 0 1 0 11 17V7h6V3H9z"/></svg>
        <span class="label">Buy Music</span>
        <span class="spacer"></span>
      </a>
    </nav>

    <footer>© <span id="yr"></span> Astravell Studios</footer>
  </main>

  <script>document.getElementById('yr').textContent = new Date().getFullYear();</script>
</body>
</html>
